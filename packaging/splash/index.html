<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Jobsmith</title>
<style>
  html, body { height: 100%; margin: 0; }
  body {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1218; color: #e6e9ef; gap: 16px;
  }
  .spinner {
    width: 36px; height: 36px; border-radius: 50%;
    border: 3px solid #2a3140; border-top-color: #5b8cff;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .hint { color: #8a93a5; font-size: 13px; max-width: 420px; text-align: center; }
</style>
</head>
<body>
  <div class="spinner"></div>
  <h2>Starting Jobsmith…</h2>
  <p class="hint">First launch downloads a browser for auto-apply (~150&nbsp;MB) and can take a few minutes. After that, startup is quick.</p>
</body>
</html>
