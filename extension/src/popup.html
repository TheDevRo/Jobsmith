<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Jobsmith</title>
<link rel="icon" type="image/png" sizes="48x48" href="icons/icon-48.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/icon-16.png">
<style>
  :root {
    --bg: #0f0f1a;
    --bg-elev: #181828;
    --bg-input: #1f1f30;
    --border: #2a2a3e;
    --border-strong: #3a3a52;
    --text: #e4e6f1;
    --text-dim: #8b8fa8;
    --text-faint: #5a5e75;
    --accent: #8b7cff;
    --accent-2: #5eb3ff;
    --accent-grad: linear-gradient(135deg, #8b7cff 0%, #5eb3ff 100%);
    --ok: #6ee7b7;
    --warn: #fcd34d;
    --err: #fb7185;
  }
  * { box-sizing: border-box; }
  body {
    font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 0;
    width: 340px;
    -webkit-font-smoothing: antialiased;
  }
  .header {
    padding: 16px 18px 14px;
    background:
      radial-gradient(circle at 0% 0%, rgba(139,124,255,0.18), transparent 60%),
      radial-gradient(circle at 100% 100%, rgba(94,179,255,0.12), transparent 60%);
    border-bottom: 1px solid var(--border);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 9px;
    margin: 0;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .logo {
    width: 22px; height: 22px; border-radius: 6px;
    display: block;
    box-shadow: 0 4px 12px rgba(99,102,241,0.35);
  }
  .tagline {
    margin: 4px 0 0 31px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .content { padding: 14px 18px 18px; }
  label {
    display: block;
    font-size: 10.5px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
    margin: 12px 0 6px;
  }
  label:first-of-type { margin-top: 0; }
  input {
    width: 100%;
    padding: 8px 10px;
    background: var(--bg-input);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 7px;
    font: inherit;
    transition: border-color 120ms ease, box-shadow 120ms ease;
  }
  input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(139,124,255,0.18);
  }
  input::placeholder { color: var(--text-faint); }
  .actions {
    display: flex;
    gap: 6px;
    margin-top: 14px;
  }
  button {
    flex: 1;
    padding: 8px 10px;
    background: var(--accent-grad);
    color: #fff;
    border: 0;
    border-radius: 7px;
    cursor: pointer;
    font: inherit;
    font-weight: 600;
    font-size: 12px;
    transition: transform 80ms ease, box-shadow 120ms ease, filter 120ms ease;
    box-shadow: 0 2px 8px rgba(139,124,255,0.25);
  }
  button:hover { filter: brightness(1.08); box-shadow: 0 4px 14px rgba(139,124,255,0.35); }
  button:active { transform: translateY(1px); }
  button.secondary {
    background: var(--bg-input);
    color: var(--text);
    border: 1px solid var(--border-strong);
    box-shadow: none;
  }
  button.secondary:hover { background: var(--bg-elev); filter: none; box-shadow: none; }
  #status {
    margin-top: 12px;
    font-size: 12px;
    min-height: 1.2em;
    padding: 8px 10px;
    border-radius: 6px;
    background: transparent;
    transition: background 120ms ease;
  }
  #status:not(:empty) { background: rgba(255,255,255,0.03); }
  .ok  { color: var(--ok); }
  .err { color: var(--err); }
</style>
</head>
<body>
<div class="header">
  <h1 class="brand">
    <img class="logo" src="icons/icon-48.png" alt="">
    Jobsmith
  </h1>
  <div class="tagline">Self-hosted apply assistant</div>
</div>

<div class="content">
  <label for="backendUrl">Backend URL</label>
  <input id="backendUrl" type="url" placeholder="http://localhost:8888">

  <label for="token">Extension token</label>
  <input id="token" type="text" placeholder="from data/extension_token.txt">

  <label style="display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:normal;font-size:12px;color:var(--text);margin-top:14px;cursor:pointer;">
    <input id="deepScan" type="checkbox" style="width:auto;margin:0;">
    <span>Deep scan (covers iframes — slower)</span>
  </label>
  <div style="font-size:11px;color:var(--text-dim);margin:4px 0 0 24px;">
    Off = fast top-frame scan. Turn on for embedded ATS forms (Greenhouse, Lever, etc).
  </div>

  <div class="actions">
    <button id="save">Save</button>
    <button id="test" class="secondary">Test</button>
    <button id="open" class="secondary">Open panel</button>
  </div>

  <label style="margin-top:16px;">Sign-in sessions</label>
  <div style="font-size:11px;color:var(--text-dim);margin:-4px 0 8px;">
    Sends your current browser cookies to the backend so the apply pipeline can act as you.
  </div>
  <div class="actions">
    <button id="syncLinkedin" class="secondary">Sync LinkedIn</button>
    <button id="syncIndeed" class="secondary">Sync Indeed</button>
  </div>

  <div id="status"></div>
</div>

<script src="common/api.js"></script>
<script src="popup.js"></script>
</body>
</html>
