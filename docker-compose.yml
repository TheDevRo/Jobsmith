services:
  jobsmith:
    build: .
    image: jobsmith:latest
    container_name: jobsmith
    restart: unless-stopped
    ports:
      # Dashboard API. Loopback-only by default: the API is unauthenticated for
      # local callers and /api/config can return profile PII and API keys, so
      # publishing it on all interfaces hands the LAN your data.
      # To reach it from another machine: set a token first
      # (Settings → Integrations → the Jobsmith API token), then widen the bind
      # by setting JOBSMITH_BIND=0.0.0.0 in .env — or, better, put it behind a
      # reverse proxy / Tailscale rather than raw LAN.
      - "${JOBSMITH_BIND:-127.0.0.1}:8888:8888"
      # noVNC (headed browser view). Loopback-only by default — the VNC
      # session holds logged-in job-site cookies, so don't expose it to the
      # LAN unless you mean to. If you set NOVNC_BIND=0.0.0.0 you MUST also set
      # VNC_PASSWORD; otherwise the container auto-generates one and prints it
      # once to the log (`docker compose logs jobsmith`), because x11vnc's
      # no-password mode on a LAN-reachable port is an open remote desktop into
      # your logged-in LinkedIn/Indeed session.
      - "${NOVNC_BIND:-127.0.0.1}:6080:6080"
    # Defaults below let the container boot with no .env present. If a
    # .env exists alongside this compose file, Compose auto-reads it and
    # those values win via the ${VAR:-default} substitution.
    environment:
      # Empty by default on purpose: a non-empty JOBSMITH_AI_* env var overrides
      # config.yaml on every load, which would make the AI endpoint/key fields in
      # Settings look like they save but do nothing. Leave these unset and edit
      # the endpoint in the UI; set them in .env only if you want env to win.
      JOBSMITH_AI_BASE_URL: ${JOBSMITH_AI_BASE_URL:-}
      JOBSMITH_AI_API_KEY: ${JOBSMITH_AI_API_KEY:-}
      JOBSMITH_FLARESOLVERR_URL: ${JOBSMITH_FLARESOLVERR_URL:-}
      BROWSER_HEADLESS: ${BROWSER_HEADLESS:-true}
      VNC_PASSWORD: ${VNC_PASSWORD:-}
      # Mirrors the port binding above so the entrypoint knows whether noVNC is
      # actually reachable off-host and can refuse to run it without a password.
      NOVNC_BIND: ${NOVNC_BIND:-127.0.0.1}
      USE_BROWSER_USE: ${USE_BROWSER_USE:-false}
      BROWSER_USE_MAX_STEPS: ${BROWSER_USE_MAX_STEPS:-50}
      BROWSER_PROFILE_DIR: ${BROWSER_PROFILE_DIR:-.browser-profile}
      SESSIONS_DIR: ${SESSIONS_DIR:-sessions}
      FAILED_SCREENSHOTS_DIR: ${FAILED_SCREENSHOTS_DIR:-failed_screenshots}
    # Chromium crashes without enough shared memory.
    shm_size: "1gb"
    extra_hosts:
      # Lets the container resolve the Docker host as host.docker.internal on
      # Linux (already supported on Mac/Win). Useful if LM Studio runs on the
      # same host as the container. For LAN/Tailscale LM Studio, set
      # JOBSMITH_AI_BASE_URL in .env instead.
      - "host.docker.internal:host-gateway"
    volumes:
      # Directory-mount (NOT file-mount) for config — the entrypoint seeds
      # config/config.yaml from the example on first run and symlinks it
      # into /app/config.yaml. Directory mounts don't hit the
      # "Docker auto-creates the host file as an empty dir" gotcha.
      - ./config:/app/config
      - ./data:/app/data
      - ./resumes:/app/resumes
      - ./sessions:/app/sessions
      - ./failed_screenshots:/app/failed_screenshots
      - ./.browser-profile:/app/.browser-profile
      # Optional cross-device sync folder. Point JOBSMITH_SYNC_FOLDER (in .env)
      # at a host directory that itself lives in iCloud/Dropbox/Syncthing, then
      # set `sync.enabled: true` and `sync.folder: /app/sync-folder` in
      # config/config.yaml. Without this mount the container would write its
      # sync docs into /app/data, which syncs nowhere. Defaults to ./sync-folder
      # so the mount is inert until you actually enable sync. Note that
      # ./sync-folder is still created on the host even when sync is off — an
      # empty, unused directory, safe to ignore.
      - ${JOBSMITH_SYNC_FOLDER:-./sync-folder}:/app/sync-folder
