name: JobsmithStandalone
schemes:
  JobsmithStandalone:
    build:
      targets:
        JobsmithStandalone: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - JobsmithStandaloneUITests
  JobsmithKit:
    build:
      targets:
        JobsmithKitTests: all
    test:
      config: Debug
      targets:
        - JobsmithKitTests
options:
  bundleIdPrefix: com.thedevro
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  JobsmithKit:
    path: JobsmithKit
# DEVELOPMENT_TEAM lives here rather than in `settings` below: a per-developer
# signing identity has no business in a tracked file, and settings written into
# the project would override the xcconfig anyway. Signing.xcconfig optionally
# includes the git-ignored Local.xcconfig, so `xcodegen generate` still
# preserves the team for headless archiving (regenerating used to wipe a
# GUI-set team and break the TestFlight archive on both app + Share ext).
configFiles:
  Debug: Signing.xcconfig
  Release: Signing.xcconfig
settings:
  base:
    SWIFT_VERSION: "5.9"
    # Tracks package.json, the version source of truth for the whole repo.
    MARKETING_VERSION: 0.2.6
    CURRENT_PROJECT_VERSION: 36
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO

targets:
  JobsmithStandalone:
    type: application
    platform: iOS
    sources:
      - path: App
        excludes:
          - PrivacyInfo.xcprivacy
      # Apple's required-reason API manifest. Declared explicitly so it is
      # unambiguously a resource in the built product — an undeclared one is an
      # ITMS-91053 rejection at upload.
      - path: App/PrivacyInfo.xcprivacy
        buildPhase: resources
      # The Live Activity wire format + Stop intent, compiled into both the
      # app and the widget extension (the two processes must agree on it).
      - path: Widgets/Shared
    dependencies:
      - package: JobsmithKit
      - target: JobsmithShare
      - target: JobsmithWidgets
    entitlements:
      path: App/Jobsmith.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.thedevro.jobsmith.standalone
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Jobsmith
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - fetch
          - processing
        # The JobRun Live Activity (search/scoring progress on the Lock Screen
        # and in the Dynamic Island). Locally updated — no push entitlement.
        NSSupportsLiveActivities: true
        BGTaskSchedulerPermittedIdentifiers:
          - com.thedevro.jobsmith.standalone.refresh
          - com.thedevro.jobsmith.standalone.processing
          # Continued-processing (iOS 26+): user-started runs that keep
          # executing after backgrounding. Wildcard by design — each run
          # registers a unique id under this family (see ContinuedRun.swift).
          - com.thedevro.jobsmith.standalone.continued.*
        CFBundleURLTypes:
          - CFBundleURLName: com.thedevro.jobsmith.standalone
            CFBundleURLSchemes:
              - jobsmith-standalone
        # LM Studio on the user's LAN is plain http; every job-board API is
        # https. WebContent: the Apply browser loads whatever URL a job ad
        # carries — Adzuna redirect chains (and some ATS hops) still use plain
        # http, which ATS otherwise refuses ("requires the use of a secure
        # connection") leaving the browser on an error instead of the form.
        # The exemption covers ONLY WKWebView content, not the app's own
        # URLSession traffic.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoadsInWebContent: true
        NSLocalNetworkUsageDescription: >-
          Jobsmith connects to your local AI server (e.g. LM Studio) for job
          scoring and resume tailoring.
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thedevro.jobsmith.standalone
        # iPhone only. The UI is a flat TabView with a swipe deck — on an iPad it
        # would render as a stretched phone app, and no NavigationSplitView work
        # is planned (UX-06).
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: NO

  JobsmithShare:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExt
        excludes:
          - PrivacyInfo.xcprivacy
      # The extension links JobsmithKit, so its binary carries the same
      # required-reason API symbols (UserDefaults, system boot time) as the
      # app's — and Apple scans each binary separately.
      - path: ShareExt/PrivacyInfo.xcprivacy
        buildPhase: resources
    dependencies:
      - package: JobsmithKit
    entitlements:
      path: ShareExt/JobsmithShare.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.thedevro.jobsmith.standalone
    info:
      path: ShareExt/Info.plist
      properties:
        CFBundleDisplayName: Save to Jobsmith
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thedevro.jobsmith.standalone.Share
        # Must match the host app's device family.
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_USER_SCRIPT_SANDBOXING: NO

  # The Live Activity host: WidgetKit renders the Lock Screen card and the
  # Dynamic Island from here. No JobsmithKit dependency — the shared attributes
  # file is the whole contract with the app.
  JobsmithWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets
        excludes:
          - PrivacyInfo.xcprivacy
      # The widget bundle is scanned separately for required-reason APIs, so it
      # needs its own manifest resource — an undeclared one is an ITMS-91053
      # rejection at upload.
      - path: Widgets/PrivacyInfo.xcprivacy
        buildPhase: resources
    # No entitlements: the Live Activity's data flows through ActivityKit, not
    # the App Group container, and an unneeded App Group here forces a custom
    # provisioning profile for the widget bundle id.
    info:
      path: Widgets/Info.plist
      properties:
        CFBundleDisplayName: Jobsmith
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thedevro.jobsmith.standalone.Widgets
        # Must match the host app's device family.
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_USER_SCRIPT_SANDBOXING: NO

  JobsmithStandaloneUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [UITests]
    dependencies:
      - target: JobsmithStandalone
    settings:
      base:
        TEST_TARGET_NAME: JobsmithStandalone
        PRODUCT_BUNDLE_IDENTIFIER: com.thedevro.jobsmith.standalone.uitests
        GENERATE_INFOPLIST_FILE: YES

  # Hostless logic tests over JobsmithKit's public API, run on the iOS
  # simulator (the Kit links UIKit-dependent code, so plain macOS
  # `swift test` can't run it).
  JobsmithKitTests:
    type: bundle.unit-test
    platform: iOS
    sources: [KitTests]
    dependencies:
      - package: JobsmithKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thedevro.jobsmith.standalone.kittests
        GENERATE_INFOPLIST_FILE: YES
