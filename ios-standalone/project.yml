name: JobsmithStandalone
schemes:
  JobsmithStandalone:
    build:
      targets:
        JobsmithStandalone: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - JobsmithStandaloneUITests
  JobsmithKit:
    build:
      targets:
        JobsmithKitTests: all
    test:
      config: Debug
      targets:
        - JobsmithKitTests
options:
  bundleIdPrefix: com.thedevro
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
packages:
  JobsmithKit:
    path: JobsmithKit
settings:
  base:
    SWIFT_VERSION: "5.9"
    # Tracks package.json, the version source of truth for the whole repo.
    MARKETING_VERSION: 0.2.4
    CURRENT_PROJECT_VERSION: 9
    CODE_SIGN_STYLE: Automatic
    # Team is declared here so `xcodegen generate` preserves signing config for
    # headless archiving — regenerating from this file otherwise wipes a
    # GUI-set team and breaks the TestFlight archive (both app + Share ext).
    DEVELOPMENT_TEAM: 37R25GNY5A
    GENERATE_INFOPLIST_FILE: NO

targets:
  JobsmithStandalone:
    type: application
    platform: iOS
    sources:
      - path: App
    dependencies:
      - package: JobsmithKit
      - target: JobsmithShare
    entitlements:
      path: App/Jobsmith.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.thedevro.jobsmith.standalone
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Jobsmith
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - fetch
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.thedevro.jobsmith.standalone.refresh
          - com.thedevro.jobsmith.standalone.processing
        CFBundleURLTypes:
          - CFBundleURLName: com.thedevro.jobsmith.standalone
            CFBundleURLSchemes:
              - jobsmith-standalone
        # LM Studio on the user's LAN is plain http; every job-board API is https.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSLocalNetworkUsageDescription: >-
          Jobsmith connects to your local AI server (e.g. LM Studio) for job
          scoring and resume tailoring.
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thedevro.jobsmith.standalone
        # iPhone only. The UI is a flat TabView with a swipe deck — on an iPad it
        # would render as a stretched phone app, and no NavigationSplitView work
        # is planned (UX-06).
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: NO

  JobsmithShare:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExt
    dependencies:
      - package: JobsmithKit
    entitlements:
      path: ShareExt/JobsmithShare.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.thedevro.jobsmith.standalone
    info:
      path: ShareExt/Info.plist
      properties:
        CFBundleDisplayName: Save to Jobsmith
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thedevro.jobsmith.standalone.Share
        # Must match the host app's device family.
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_USER_SCRIPT_SANDBOXING: NO

  JobsmithStandaloneUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [UITests]
    dependencies:
      - target: JobsmithStandalone
    settings:
      base:
        TEST_TARGET_NAME: JobsmithStandalone
        PRODUCT_BUNDLE_IDENTIFIER: com.thedevro.jobsmith.standalone.uitests
        GENERATE_INFOPLIST_FILE: YES

  # Hostless logic tests over JobsmithKit's public API, run on the iOS
  # simulator (the Kit links UIKit-dependent code, so plain macOS
  # `swift test` can't run it).
  JobsmithKitTests:
    type: bundle.unit-test
    platform: iOS
    sources: [KitTests]
    dependencies:
      - package: JobsmithKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thedevro.jobsmith.standalone.kittests
        GENERATE_INFOPLIST_FILE: YES
